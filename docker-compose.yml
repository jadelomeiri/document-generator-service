services:
  postgres:
    image: postgres:18
    container_name: ice-music-metadata-postgres
    environment:
      POSTGRES_DB: music_metadata
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d music_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: