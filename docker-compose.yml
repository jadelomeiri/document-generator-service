services:
  document-generator-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/document_generator
      SPRING_DATASOURCE_USERNAME: document_generator
      SPRING_DATASOURCE_PASSWORD: document_generator
      SERVER_PORT: 8080
      JAVA_OPTS: ${JAVA_OPTS:-}

  postgres:
    image: postgres:18
    container_name: document-generator-service-postgres
    environment:
      POSTGRES_DB: document_generator
      POSTGRES_USER: document_generator
      POSTGRES_PASSWORD: document_generator
    ports:
      - "5432:5432"
    volumes:
      - document_generator_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document_generator -d document_generator"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  document_generator_postgres_data:
